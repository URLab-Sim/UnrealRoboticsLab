[CoreRedirects]
; UMjGeom::fitscale was wrongly typed bool (Phase 4.1 fix); now double
; (matches mjsGeom.fitscale's real C type — a scaling factor, not a
; boolean toggle). UE serialization rejects bool->double in-place, so
; CoreRedirects can't smart-migrate the value. Mark the old field as
; removed so loading legacy data drops it silently instead of crashing
; on a type mismatch. New defaults take over (override-toggle off,
; fitscale = 0.0).
+PropertyRedirects=(OldName="/Script/URLab.MjGeom.fitscale_DEPRECATED",NewName="/Script/URLab.MjGeom.fitscale",MatchSubstring=false)
